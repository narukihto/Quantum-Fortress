[package]
name = "quantum_fortress"
version = "1.0.0"
edition = "2021"
description = "Post-Quantum Secure API Gateway with Entropy Analysis"

[dependencies]
axum = "0.7"
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
moka = { version = "0.12", features = ["future"] }
tower-http = { version = "0.5", features = ["limit"] }
tower = { version = "0.4", features = ["util"] }
pqcrypto-kyber = "0.8"
pqcrypto-dilithium = "0.5"
pqcrypto-traits = "0.3"
