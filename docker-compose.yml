version: '3.8'

services:
  quantum-fortress:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: quantum_fortress_sentinel
    
    # Port Mapping with fallback
    ports:
      - "${SERVER_PORT:-3000}:3000"
    
    # Load security configurations from .env
    env_file:
      - .env
    
    # --- Resource Defense Strategy ---
    # Prevents Resource Exhaustion attacks (DoS)
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    
    # --- Self-Healing Strategy ---
    restart: always 

    # --- Persistent Data & Audit Logs ---
    # Map the audit log file so it persists even if the container restarts
    volumes:
      - ./audit_log.csv:/app/audit_log.csv
    
    # --- Hardened Security Layers ---
    security_opt:
      - no-new-privileges:true 
    cap_drop:
      - ALL 
    # Since we use an audit log file, we keep read_only: false 
    # but restrict it using tmpfs for temporary overhead
    tmpfs:
      - /tmp 
    
    # --- Logging Security ---
    # Prevents log injection or disk fill attacks
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  default:
    name: quantum_secure_net
