version: '3.8'

services:
  quantum-fortress:
    build: .
    container_name: quantum_fortress_sentinel
    ports:
      - "${SERVER_PORT:-3000}:3000"
    env_file:
      - .env
    
    # --- Resource Defense Strategy ---
    deploy:
      resources:
        limits:
          cpus: '0.50' # Max 50% CPU usage to prevent spikes
          memory: 512M # Max 512MB RAM to prevent memory leaks
    
    # --- Self-Healing Strategy ---
    restart: always # Auto-restart if the service crashes or the server reboots
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
    
    # --- Logging Security ---
    logging:
      driver: "json-file"
      options:
        max-size: "10m" # Prevents disk-filling attacks via logs
        max-file: "3"
