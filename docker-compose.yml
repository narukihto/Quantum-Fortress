version: '3.8'

services:
  quantum-fortress:
    build: .
    container_name: quantum_fortress_sentinel
    # Use environment variables with sensible defaults
    ports:
      - "${SERVER_PORT:-3000}:3000"
    env_file:
      - .env
    
    # --- Resource Defense Strategy ---
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    
    # --- Self-Healing Strategy ---
    restart: always 
    
    # NOTE: Healthcheck with 'curl' will fail on Distroless images.
    # We rely on the Rust binary's internal panic handling and Docker's restart policy.
    # Or you can use a gRPC health probe if implemented.

    # --- Hardened Security Layers ---
    security_opt:
      - no-new-privileges:true # Prevents processes from gaining new privileges
    cap_drop:
      - ALL # Drops all Linux capabilities (Extreme security)
    read_only: false # Set to true if your app doesn't need to write to disk
    tmpfs:
      - /tmp # Allow memory-based temp files only
    
    # --- Logging Security ---
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
