<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantumFortress | Enterprise Security Suite</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #020617; --card: #1e293b; --accent: #38bdf8;
            --danger: #f43f5e; --warning: #f59e0b; --success: #10b981;
        }
        body { background: var(--bg); color: #f8fafc; font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: #0f172a; border-right: 1px solid #1e293b; padding: 20px; display: flex; flex-direction: column; }
        .nav-item { padding: 12px; margin: 5px 0; border-radius: 8px; cursor: pointer; color: #94a3b8; transition: 0.3s; }
        .nav-item.active { background: var(--accent); color: #000; font-weight: bold; }
        .nav-item:hover:not(.active) { background: #1e293b; color: #fff; }

        /* Main Content */
        .main { flex: 1; padding: 30px; overflow-y: auto; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid #334155; position: relative; overflow: hidden; }
        .card::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; background: var(--accent); }
        .card.danger::after { background: var(--danger); }
        .card.warning::after { background: var(--warning); }
        
        .val { font-size: 2.2rem; font-weight: 800; margin: 10px 0; }
        .label { color: #94a3b8; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }

        .dashboard-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .chart-box { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid #334155; }
        
        /* Interactive Log Feed */
        .log-panel { background: #000; border-radius: 12px; padding: 15px; height: 350px; overflow-y: auto; font-family: 'Fira Code', monospace; font-size: 0.8rem; border: 1px solid #334155; }
        .log-entry { margin-bottom: 8px; padding: 5px; border-left: 2px solid var(--accent); animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color:var(--accent)"><i class="fas fa-microchip"></i> Q-Fortress</h2>
    <div class="nav-item active"><i class="fas fa-chart-line"></i> Dashboard</div>
    <div class="nav-item"><i class="fas fa-shield-virus"></i> Threat Intel</div>
    <div class="nav-item"><i class="fas fa-key"></i> PQC Keys</div>
    <div class="nav-item"><i class="fas fa-cog"></i> Settings</div>
    <div style="margin-top:auto; font-size: 0.7rem; color: #475569;">System Status: <span style="color:var(--success)">SECURE</span></div>
</div>

<div class="main">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h1>Security Command Center</h1>
        <div id="uptime" style="color:var(--accent)">System Uptime: 00:00:00</div>
    </div>

    <div class="stats-grid">
        <div class="card">
            <div class="label">Traffic Load</div>
            <div class="val" id="total_req">0</div>
            <i class="fas fa-network-wired" style="position:absolute; right:20px; top:20px; opacity:0.2; font-size:2rem"></i>
        </div>
        <div class="card danger">
            <div class="label">Blocked Threats</div>
            <div class="val" id="blocked_total">0</div>
            <i class="fas fa-user-shield" style="position:absolute; right:20px; top:20px; opacity:0.2; font-size:2rem"></i>
        </div>
        <div class="card warning">
            <div class="label">Entropy Alerts</div>
            <div class="val" id="entropy_val">0</div>
            <i class="fas fa-wave-square" style="position:absolute; right:20px; top:20px; opacity:0.2; font-size:2rem"></i>
        </div>
        <div class="card">
            <div class="label">PQC Verifications</div>
            <div class="val" style="color:var(--success)">99.9%</div>
            <i class="fas fa-atom" style="position:absolute; right:20px; top:20px; opacity:0.2; font-size:2rem"></i>
        </div>
    </div>

    <div class="dashboard-layout">
        <div class="chart-box">
            <h3>Live Traffic & Attack Mitigation</h3>
            <canvas id="mainChart" height="120"></canvas>
        </div>
        <div class="chart-box">
            <h3>Real-time Security Logs</h3>
            <div id="log-panel" class="log-panel"></div>
        </div>
    </div>
</div>

<script>
    const ctx = document.getElementById('mainChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                label: 'Global Requests',
                data: [],
                borderColor: '#38bdf8',
                backgroundColor: 'rgba(56, 189, 248, 0.1)',
                fill: true,
                tension: 0.4
            }]
        },
        options: { responsive: true, scales: { y: { display: false }, x: { grid: { display: false } } } }
    });

    // Interaction Logic
    async function fetchData() {
        try {
            const res = await fetch('/api/stats');
            const data = await res.json();
            
            document.getElementById('total_req').innerText = data.total_requests;
            document.getElementById('blocked_total').innerText = data.blocked_replay;
            document.getElementById('entropy_val').innerText = data.blocked_entropy;

            // Update Chart
            const time = new Date().toLocaleTimeString();
            chart.data.labels.push(time);
            chart.data.datasets[0].data.push(data.total_requests);
            if(chart.data.labels.length > 15) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); }
            chart.update();

            if(data.blocked_replay > 0) addLog(`Replay Attack Mitigated: Nonce Conflict`, 'warning');
        } catch(e) {}
    }

    function addLog(msg, type) {
        const panel = document.getElementById('log-panel');
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.style.borderColor = type === 'warning' ? 'var(--warning)' : 'var(--accent)';
        entry.innerHTML = `<span style="color:#475569">[${new Date().toLocaleTimeString()}]</span> ${msg}`;
        panel.prepend(entry);
    }

    setInterval(fetchData, 2000);
</script>
</body>
</html>
