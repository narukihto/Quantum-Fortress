name: Quantum-Fortress CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config libssl-dev build-essential

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Create Dummy ABI file
      # This is critical because abigen! needs the JSON to compile
      run: |
        echo '[]' > IntegrityLedger.json 

    - name: Build
      run: cargo build --verbose

    - name: Run Tests
      run: cargo test --verbose
