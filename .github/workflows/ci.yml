name: Quantum-Fortress CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install System Dependencies
      run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev build-essential

    - name: Create ABI Dummy for Compilation
      run: |
        echo '[{"inputs":[{"internalType":"bytes32","name":"_hash","type":"bytes32"}],"name":"anchorContent","outputs":[],"stateMutability":"nonpayable","type":"function"}]' > IntegrityLedger.json

    - name: Check Build
      run: cargo check --verbose

    - name: Run Unit Tests
      run: cargo test --verbose
